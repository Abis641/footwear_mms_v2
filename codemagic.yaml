workflows:
  android-workflow:
    name: Android Build

    environment:
      flutter: stable

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Generate app icon
        script: |
          flutter pub run flutter_launcher_icons

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
